name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # write pour pouvoir pousser le lint-fix automatique

jobs:

  # ── Job 1 : Lint auto-fix ──────────────────────────────────────────────────
  lint-fix:
    name: Lint auto-fix (ruff)
    runs-on: ubuntu-latest
    # Uniquement sur les push directs (pas sur les PR d'autres forks)
    if: github.event_name == 'push'
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      - name: Ruff — fix automatique
        run: uv run ruff check src/ --fix --exit-zero

      - name: Commit & push des corrections (si besoin)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ── Job 2 : Qualité (lint strict + types + tests) ─────────────────────────
  quality:
    name: Qualité (lint + types + tests)
    runs-on: ubuntu-latest
    needs: [lint-fix]
    if: always()
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances (projet + dev)
        run: uv sync

      - name: Lint strict (ruff — aucune tolérance ici)
        run: uv run ruff check src/

      - name: Types (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        run: uv run pytest

  # ── Job 3 : Entraînement ───────────────────────────────────────────────────
  train:
    name: Entraînement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      - name: Entraînement de la baseline
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          PYTHONPATH: "."
        run: |
          mkdir -p data models
          uv run python -m src.train

      - name: Publication du modèle en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 30

      - name: Publication de mlflow.db en artefact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db
          retention-days: 1

      - name: Publication des artefacts MLflow (mlruns/)
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 1

  # ── Job 4 : Évaluation / porte qualité ────────────────────────────────────
  evaluate:
    name: Évaluation & porte qualité (MLflow)
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      - name: Récupération du modèle
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models/

      - name: Récupération de mlflow.db
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db
          path: .

      - name: Récupération des artefacts MLflow
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Évaluation du modèle (src.evaluate)
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          PYTHONPATH: "."
        run: |
          mkdir -p data
          uv run python -m src.evaluate
        # Le script lève SystemExit(1) si les seuils roc_auc / f1_score
        # définis dans src/config.py ne sont pas atteints → le job échoue
        # et bloque la CD automatiquement.