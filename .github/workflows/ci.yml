name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualité (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances (projet + dev)
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Types (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        run: uv run pytest

  train:
    name: Entraînement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      - name: Entraînement de la baseline
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          PYTHONPATH: "."
        run: |
          mkdir -p data models
          uv run python -m src.train

      - name: Publication du modèle en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 30