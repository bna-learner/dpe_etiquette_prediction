# TP Séance 19 - Livraison continue (CD) avec GitHub Actions
#
# Placez ce fichier dans .github/workflows/ à la RACINE de votre dépôt.
name: CD

# S19-1 : déclenchement sur push de main ET sur les tags vX.Y.Z
on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

# Pas d'annulation en cours : on ne veut pas interrompre une livraison.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest

    # S19-2 : permission d'écriture sur les packages GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # S19-3 : connexion à GHCR
      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # S19-4 : calcul des tags et labels
      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/dpe-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # S19-5 : build et push de l'image
      - name: Build & push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max