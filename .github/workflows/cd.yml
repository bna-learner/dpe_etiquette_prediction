name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # ── Job 1 : Build & push de l'image API sur GHCR ──────────────────────────
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/dpe-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2 : Déploiement sur le VPS Oracle ─────────────────────────────────
  deploy:
    name: Déploiement sur le VPS Oracle
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      # ── 2.1 : Copie des fichiers vers le VPS ──────────────────────────────
      - name: Copie des fichiers via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: "-avz --delete --exclude='.git/' --exclude='.venv/' --exclude='__pycache__/' --exclude='*.pyc' --exclude='mlflow.db' --exclude='models/*.joblib' --exclude='data/' --exclude='htmlcov/'"
          path: .
          remote_path: ${{ secrets.VPS_DEPLOY_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      # ── 2.2 : SSH + docker compose up ─────────────────────────────────────
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Authentification GHCR depuis le VPS
            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Pull uniquement les images distantes (pas les images buildées localement)
            docker compose pull mlflow postgres

            # Build des images locales (api depuis GHCR déjà pullée, les autres en local)
            docker compose build frontend airflow-webserver airflow-scheduler
            docker compose --profile train build train

            # Démarrer MLflow en premier
            docker compose up -d mlflow
            sleep 5

            # Entraînement one-shot dans Docker
            docker compose --profile train run --rm train

            # Démarrer API + Frontend
            docker compose up -d api frontend

            # Airflow (init idempotent + démarrage)
            docker compose run --rm airflow-init 2>/dev/null || true
            docker compose up -d airflow-webserver airflow-scheduler

            # Nettoyage
            docker image prune -f

            echo "✅ Déploiement terminé — $(date -u)"
            echo ""
            echo "MLflow   → http://${{ secrets.VPS_HOST }}:5000"
            echo "API      → http://${{ secrets.VPS_HOST }}:8000/docs"
            echo "Frontend → http://${{ secrets.VPS_HOST }}:8501"
            echo "Airflow  → http://${{ secrets.VPS_HOST }}:8080"