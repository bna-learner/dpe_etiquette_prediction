# Séance 14 - TP docker-compose : orchestration de la stack DPE
#
# Commandes (depuis la racine du projet) :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api frontend
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501, MLflow sur http://localhost:5000

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    # S14-1 : port 8000
    ports:
      - "8000:8000"
    # S14-2 : volume models en lecture seule
    volumes:
      - models_data:/app/models:ro
    environment:
      PYTHONPATH: /app
    # S14-3 : healthcheck sur GET /health
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      - mlflow

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # S14-4 : URL de l'API via nom de service Docker
    environment:
      API_URL: http://api:8000
    # S14-5 : port 8501
    ports:
      - "8501:8501"
    # S14-6 : attendre que l'API soit saine
    depends_on:
      api:
        condition: service_healthy

volumes:
  mlflow_data:
  models_data: