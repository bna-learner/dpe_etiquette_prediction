# Séance 14 - TP docker-compose : orchestration de la stack DPE
#
# Commandes (depuis la racine du projet) :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api frontend
#   docker compose run --rm airflow-init
#   docker compose up -d airflow-webserver airflow-scheduler
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501
#   -> MLflow sur http://localhost:5000, Airflow sur http://localhost:8080

x-airflow-common: &airflow-common
  image: dpe-airflow
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./src:/opt/airflow/src
    - airflow_logs:/opt/airflow/logs
    - models_data:/opt/airflow/models
  depends_on:
    postgres:
      condition: service_healthy
    # ✅ FIX 1 : Airflow attend aussi que MLflow soit sain
    mlflow:
      condition: service_healthy

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    # ✅ FIX 1 : healthcheck sur MLflow — sans ça, train démarre avant que le
    # serveur soit prêt → les runs MLflow échouent silencieusement.
    # On utilise python urllib car curl n'est PAS disponible dans l'image MLflow.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    # ✅ FIX 1 : attend que MLflow soit vraiment opérationnel (service_healthy)
    # au lieu d'un simple depends_on qui ne vérifie que le démarrage du container
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models:ro
    environment:
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      mlflow:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  mlflow_data:
  models_data:
  postgres_data:
  airflow_logs: